name: Build Dolphin Wii U

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CMAKE_PREFIX_PATH: /usr/lib/x86_64-linux-gnu/cmake

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6.0.2

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build git pkg-config \
          libsdl3-dev libglslang-dev libusb-1.0-0-dev \
          libpugixml-dev libenet-dev libmbedtls-dev \
          libsfml-dev libminiupnpc-dev libhidapi-dev \
          libspeexdsp-dev libcurl4-openssl-dev libbrotli-dev \
          liblzma-dev libzstd-dev libbz2-dev libssl-dev \
          libpulse-dev libasound2-dev libjack-jackd2-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
          libxext-dev libxi-dev python3 python3-pip

    - name: Configure CMake
      run: |
        rm -rf build
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -G Ninja \
          -DCMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH

    - name: Build Dolphin
      run: |
        cd build
        ninja

    - name: Archive build
      uses: actions/upload-artifact@v7
      with:
        name: dolphin-wiiu-build
        path: build/
