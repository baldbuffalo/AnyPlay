name: WiiU Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build WiiU Homebrew
    runs-on: ubuntu-latest
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT: /opt/devkitpro/wut
      PORTLIBS: /opt/devkitpro/portlibs/wiiu
      PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:$PATH

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build git wget unzip \
          libbz2-dev liblzma-dev libzstd-dev zlib1g-dev \
          libssl-dev libiconv-hook-dev curl \
          pkg-config python3 python3-pip python3-setuptools \
          libxxhash-dev bzip2 xz-utils lz4 \
          libglib2.0-dev libudev-dev libevdev-dev \
          perl

    # SDL3 build from source
    - name: Build SDL3
      run: |
        git clone https://github.com/libsdl-org/SDL.git SDL3
        cd SDL3
        git checkout release-3.3.2   # latest stable SDL3 tag
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DSDL_STATIC=OFF
        sudo cmake --build . --target install

    # glslang build from source
    - name: Build glslang
      run: |
        git clone https://github.com/KhronosGroup/glslang.git
        cd glslang
        git checkout master
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
        sudo cmake --build . --target install

    # Clone your Wii U project
    - name: Clone Project (if needed)
      run: git clone https://github.com/yourusername/your-wiiu-project.git

    # Build the Wii U project
    - name: Build Wii U Homebrew
      run: |
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -G Ninja
        ninja

    # Upload artifacts
    - name: Upload WiiU build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: wiiu-build
        path: build/*.elf
