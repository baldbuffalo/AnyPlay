name: Build AnyPlay for LG WebOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install essential tools
      run: |
        sudo apt-get update
        sudo apt-get install -y tar gzip git cmake ninja-build build-essential pkg-config \
          libbz2-dev liblzma-dev zlib1g-dev liblz4-dev \
          libenet-dev libgl1-mesa-dev libegl1-mesa-dev \
          python3 python3-pip perl wget curl

    - name: Set Devkit Environment
      run: |
        echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
        echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> $GITHUB_ENV
        echo "WUT_ROOT=/opt/devkitpro/wut" >> $GITHUB_ENV
        echo "PORTLIBS=/opt/devkitpro/portlibs/wiiu" >> $GITHUB_ENV
        echo "/opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:$PATH" >> $GITHUB_PATH

    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        repository: baldbuffalo/AnyPlay
        token: ${{ secrets.GITHUB_TOKEN }}
        ssh-strict: true
        ssh-user: git
        persist-credentials: true
        clean: true
        sparse-checkout-cone-mode: true
        fetch-depth: 1
        fetch-tags: false
        show-progress: true
        lfs: false
        submodules: false
        set-safe-directory: true

    - name: Create build directory
      run: mkdir -p build

    - name: Configure build
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G Ninja \
            -DCMAKE_INSTALL_PREFIX=/opt/anyplay-webos

    - name: Build AnyPlay
      run: cmake --build build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: anyplay-webos-build
        path: build/
