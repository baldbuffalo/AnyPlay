name: Build AnyPlay for LG WebOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT: /opt/devkitpro/wut
      PORTLIBS: /opt/devkitpro/portlibs/wiiu
      PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:$PATH

    steps:
    - name: Install essential tools
      run: |
        apt-get update
        apt-get install -y tar gzip git cmake ninja-build build-essential pkg-config \
          libbz2-dev liblzma-dev zlib1g-dev liblz4-dev \
          libenet-dev libgl1-mesa-dev libegl1-mesa-dev \
          python3 python3-pip perl wget curl

    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        repository: baldbuffalo/AnyPlay
        token: ${{ secrets.GITHUB_TOKEN }}
        ssh-strict: true
        ssh-user: git
        persist-credentials: true
        clean: true
        sparse-checkout-cone-mode: true
        fetch-depth: 1
        fetch-tags: false
        show-progress: true
        lfs: false
        submodules: false
        set-safe-directory: true

    - name: Create build directory
      run: |
        mkdir -p build
        cd build

    - name: Configure build
      run: |
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -G Ninja \
          -DCMAKE_INSTALL_PREFIX=/opt/anyplay-webos

    - name: Build AnyPlay
      run: |
        cd build
        ninja

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: anyplay-webos-build
        path: build/
