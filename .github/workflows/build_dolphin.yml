name: Build Dolphin (Wii Emulator)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2️⃣ Install required dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git cmake ninja-build g++ pkg-config \
            libudev-dev libevdev-dev \
            libx11-dev libxi-dev libxrandr-dev \
            libegl1-mesa-dev libgl1-mesa-dev \
            ffmpeg \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev

      # 3️⃣ Clone Dolphin with submodules
      - name: Clone Dolphin (with submodules)
        run: |
          rm -rf Wii/Dolphin
          mkdir -p Wii
          git clone --depth 1 --recurse-submodules https://github.com/dolphin-emu/dolphin.git Wii/Dolphin

      # 4️⃣ Configure & Build Dolphin
      - name: Build Dolphin
        run: |
          mkdir -p Wii/Dolphin/build
          cd Wii/Dolphin/build
          cmake -G Ninja -DCMAKE_POLICY_DEFAULT_CMP0080=NEW ..
          ninja

      # 5️⃣ Upload built binaries
      - name: Upload Dolphin Build
        uses: actions/upload-artifact@v7
        with:
          name: dolphin-build
          path: Wii/Dolphin/build/Binaries
