name: Build Dolphin Full GUI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: ${{ env.DEVKITPRO }}/devkitPPC
      WUT_ROOT: ${{ env.DEVKITPRO }}/wut
      PORTLIBS: ${{ env.DEVKITPRO }}/portlibs/wiiu
      PATH: ${{ env.DEVKITPPC }}/bin:${{ env.DEVKITPRO }}/tools/bin:$PATH

    steps:
    - name: Checkout AnyPlay
      uses: actions/checkout@v6.0.2
      with:
        repository: baldbuffalo/AnyPlay
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
        clean: true
        fetch-depth: 1
        show-progress: true

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build git wget curl tar \
          pkg-config python3 python3-pip \
          libbz2-dev liblzma-dev libzstd-dev libssl-dev \
          libglib2.0-dev libglib2.0-bin libpng-dev \
          libfreetype6-dev libjpeg-dev libsndfile1-dev \
          libasound2-dev pulseaudio libpulse-dev \
          x11-xserver-utils xorg-dev libx11-dev libxext-dev \
          libxi-dev libxxf86vm-dev libxcursor-dev libxrandr-dev \
          libxinerama-dev

    # SDL3 from source
    - name: Build SDL3
      run: |
        git clone --branch release-3.2.0 https://github.com/libsdl-org/SDL.git SDL3
        cd SDL3
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DSDL_STATIC=OFF
        sudo cmake --build . --target install

    # glslang from source
    - name: Build glslang
      run: |
        git clone --branch master https://github.com/KhronosGroup/glslang.git
        cd glslang
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
        sudo cmake --build . --target install

    # Dolphin build
    - name: Build Dolphin (Full GUI)
      run: |
        git clone --branch master https://github.com/dolphin-emu/dolphin.git
        cd dolphin
        mkdir build && cd build
        cmake .. \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_HEADLESS=OFF \
          -DUSE_SYSTEM_SDL=ON \
          -DUSE_SYSTEM_GLSLANG=ON \
          -DUSE_SYSTEM_LIBUSB=OFF \
          -DUSE_SYSTEM_ENET=OFF \
          -DUSE_SYSTEM_FMT=OFF
        ninja
        # optional: install to /usr/local
        sudo ninja install

    - name: Upload Dolphin binaries
      uses: actions/upload-artifact@v7
      with:
        name: dolphin-binaries
        path: dolphin/build/
