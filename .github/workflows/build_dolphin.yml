name: Build Dolphin for LG WebOS TV

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-dolphin:
    runs-on: ubuntu-latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC
      WUT_ROOT: /opt/devkitpro/wut
      PORTLIBS: /opt/devkitpro/portlibs/wiiu
      PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:$PATH

    steps:
      - name: Install basic tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tar gzip git cmake ninja-build build-essential pkg-config \
            libbz2-dev liblzma-dev zlib1g-dev liblz4-dev \
            libenet-dev libgl1-mesa-dev libegl1-mesa-dev \
            python3 python3-pip perl wget curl

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          repository: baldbuffalo/AnyPlay
          fetch-depth: 1
          clean: true

      - name: Create build folder
        run: mkdir -p build && cd build

      - name: Configure CMake
        run: cmake .. -DCMAKE_BUILD_TYPE=Release -G Ninja \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO

      - name: Build Dolphin
        run: ninja -C build

      - name: Package build
        uses: actions/upload-artifact@v7
        with:
          name: dolphin-build
          path: build/
