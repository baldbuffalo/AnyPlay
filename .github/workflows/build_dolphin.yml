name: Build Dolphin Wii U

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CMAKE_PREFIX_PATH: /usr/lib/x86_64-linux-gnu/cmake

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6.0.2

    - name: Install basic dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build git pkg-config \
          libusb-1.0-0-dev libpugixml-dev libenet-dev \
          libmbedtls-dev libsfml-dev libminiupnpc-dev libhidapi-dev \
          libspeexdsp-dev libcurl4-openssl-dev libbrotli-dev \
          liblzma-dev libzstd-dev libbz2-dev libssl-dev \
          libpulse-dev libasound2-dev libjack-jackd2-dev \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev \
          libxext-dev libxi-dev python3 python3-pip

    - name: Install SDL3
      run: |
        git clone --branch release-3.3.0 https://github.com/libsdl-org/SDL.git SDL3
        cd SDL3
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DSDL_STATIC=OFF
        sudo cmake --build . --target install

    - name: Install glslang
      run: |
        git clone --branch master https://github.com/KhronosGroup/glslang.git glslang
        cd glslang
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
        sudo cmake --build . --target install

    - name: Configure CMake
      run: |
        rm -rf build
        mkdir build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -G Ninja \
          -DCMAKE_PREFIX_PATH=/usr/local:$CMAKE_PREFIX_PATH

    - name: Build Dolphin
      run: |
        cd build
        ninja

    - name: Archive build
      uses: actions/upload-artifact@v7
      with:
        name: dolphin-wiiu-build
        path: build/
